name: Refresh MLB data

# Re-runs the MLB Stats API pipeline daily during the season and commits the
# updated JSON. The deploy workflow then redeploys automatically on the push.
on:
  schedule:
    - cron: "0 12 * * *" # 12:00 UTC daily (~morning US, after the previous night's games)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run data
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data
          git diff --staged --quiet || git commit -m "data: daily MLB Stats API refresh"
          git push
